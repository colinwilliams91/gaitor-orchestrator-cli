name: "\U0001F4A1 New Ticket"
description: Suggest a new task

title: 'your-issue'

body:
  - type: markdown
    attributes:
      value: |
        _Thank you for taking the time to propose a new idea_

  - type: textarea
    id: problem
    attributes:
      label: '<h2>Describe the Problem</h2>'
      description: Please provide a short user story **DESCRIPTION** of the **PROBLEM**
      placeholder: As a user I... As a developer I... As an Agent I...
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: '<h2>Describe the Acceptance Criteria</h2>'
      description: Please provide a short user story **DESCRIPTION** of the **ACCEPTANCE CRITERIA**
      placeholder: X must display... Y must be able to... Z must not do...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: '<h2>References</h2>'
      description: Please provide any **SCREENSHOTS**, **CODE SNIPPETS**, **SUGGESTIONS** or **LINKS** to the codebase or documentation which will help implement a solution.